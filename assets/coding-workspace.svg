<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Developer workspace illustration">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a1033"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)" rx="18"/>

  <!-- desk -->
  <rect x="80" y="210" width="1040" height="18" rx="9" fill="#30363d"/>
  <rect x="120" y="228" width="960" height="52" rx="12" fill="#21262d"/>

  <!-- laptop -->
  <rect x="430" y="118" width="340" height="190" rx="14" fill="#161b22" stroke="#30363d" stroke-width="3"/>
  <rect x="450" y="136" width="300" height="148" rx="8" fill="#010409"/>
  <rect x="470" y="156" width="90" height="10" rx="5" fill="url(#accent)" opacity="0.9"/>
  <rect x="470" y="176" width="220" height="8" rx="4" fill="#30363d"/>
  <rect x="470" y="194" width="180" height="8" rx="4" fill="#30363d"/>
  <rect x="470" y="212" width="240" height="8" rx="4" fill="#30363d"/>
  <rect x="470" y="230" width="150" height="8" rx="4" fill="#238636"/>
  <rect x="470" y="248" width="200" height="8" rx="4" fill="#30363d"/>
  <rect x="500" y="292" width="200" height="10" rx="5" fill="#30363d"/>

  <!-- coffee -->
  <rect x="860" y="168" width="58" height="72" rx="10" fill="#6e40c9"/>
  <rect x="872" y="156" width="34" height="18" rx="8" fill="#8b5cf6"/>
  <path d="M918 186 C938 186 938 214 918 214" fill="none" stroke="#a78bfa" stroke-width="4"/>

  <!-- plant -->
  <rect x="220" y="176" width="42" height="56" rx="8" fill="#238636"/>
  <ellipse cx="241" cy="160" rx="34" ry="24" fill="#2ea043"/>
  <ellipse cx="218" cy="172" rx="22" ry="18" fill="#3fb950"/>
  <ellipse cx="264" cy="170" rx="20" ry="16" fill="#56d364"/>

  <!-- notebook -->
  <rect x="150" y="182" width="56" height="72" rx="6" fill="#f0f6fc" opacity="0.92"/>
  <line x1="162" y1="202" x2="194" y2="202" stroke="#8b949e" stroke-width="3"/>
  <line x1="162" y1="218" x2="194" y2="218" stroke="#8b949e" stroke-width="3"/>
  <line x1="162" y1="234" x2="186" y2="234" stroke="#8b949e" stroke-width="3"/>

  <!-- sticky note -->
  <rect x="980" y="132" width="92" height="72" rx="6" fill="#fbbf24" transform="rotate(8 1026 168)"/>
  <text x="1000" y="160" fill="#78350f" font-family="Georgia, serif" font-size="11" transform="rotate(8 1026 168)">Ship fast.</text>
  <text x="996" y="178" fill="#78350f" font-family="Georgia, serif" font-size="11" transform="rotate(8 1026 168)">Learn faster.</text>

  <!-- floating code symbols -->
  <text x="110" y="92" fill="url(#accent)" font-family="monospace" font-size="28" filter="url(#glow)">&lt;/&gt;</text>
  <text x="1040" y="88" fill="#58a6ff" font-family="monospace" font-size="24">{ }</text>
  <text x="980" y="260" fill="#a371f7" font-family="monospace" font-size="22">AI</text>
  <text x="130" y="250" fill="#3fb950" font-family="monospace" font-size="22">git</text>

  <!-- header line -->
  <rect x="300" y="42" width="600" height="4" rx="2" fill="url(#accent)" opacity="0.8"/>
  <text x="600" y="34" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="18" letter-spacing="2">CODE · CREATE · SECURE</text>
</svg>
